<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrispAI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0d0d0d; color: #e0e0e0;
      height: 100vh; display: flex; flex-direction: column;
      overflow: hidden; font-size: 13px; user-select: none;
    }

    /* ── Top bar ── */
    .topbar {
      height: 44px; background: #161616;
      border-bottom: 1px solid #222;
      display: flex; align-items: center;
      padding: 0 16px; gap: 12px; flex-shrink: 0;
    }
    .logo { font-size: 15px; font-weight: 700; letter-spacing: 1.5px; color: #fff; }
    .sep { width: 1px; height: 18px; background: #2a2a2a; }
    .filename { font-size: 12px; color: #777; }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      background: #222; border: 1px solid #2e2e2e; color: #888;
      width: 28px; height: 28px; border-radius: 5px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; line-height: 1; transition: background 0.12s, color 0.12s;
    }
    .icon-btn:hover { background: #2a2a2a; color: #ccc; }
    .text-btn {
      background: #222; border: 1px solid #2e2e2e; color: #aaa;
      padding: 5px 12px; border-radius: 5px; font-size: 12px;
      cursor: pointer; transition: background 0.12s;
    }
    .text-btn:hover { background: #2a2a2a; color: #ddd; }
    .zoom-label { font-size: 11px; color: #555; min-width: 42px; text-align: center; }

    /* ── Drop zone ── */
    .drop-screen {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background:
        radial-gradient(ellipse at center, #161616 0%, #0d0d0d 70%);
    }
    .drop-zone {
      width: 520px; min-height: 320px;
      border: 2px dashed #2a2a2a; border-radius: 12px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; padding: 50px 40px;
      transition: all 0.2s; cursor: pointer;
      background: rgba(255,255,255,0.01);
    }
    .drop-zone:hover, .drop-zone.dragging {
      border-color: #4a9eff; background: rgba(74,158,255,0.05);
    }
    .drop-icon {
      font-size: 56px; color: #333; line-height: 1;
    }
    .drop-zone:hover .drop-icon, .drop-zone.dragging .drop-icon { color: #4a9eff; }
    .drop-title { font-size: 18px; font-weight: 600; color: #ddd; letter-spacing: 0.3px; }
    .drop-hint  { font-size: 12px; color: #555; line-height: 1.6; text-align: center; }
    .drop-hint b { color: #888; font-weight: 600; }
    .drop-cta {
      background: #1d5bbf; border: 1px solid #2469d6; color: #fff;
      padding: 10px 28px; border-radius: 7px; font-size: 13px;
      font-weight: 600; cursor: pointer; margin-top: 4px;
      transition: background 0.15s;
    }
    .drop-cta:hover { background: #2166cc; }
    .drop-formats { font-size: 10px; color: #2e2e2e; letter-spacing: 1px; margin-top: 8px; }

    /* ── Main editor layout ── */
    .main { flex: 1; display: flex; overflow: hidden; }

    /* ── Image area ── */
    .image-area {
      flex: 1; background: #0d0d0d; position: relative;
      overflow: auto;          /* scroll when zoomed in past viewport size */
    }
    .image-area::-webkit-scrollbar { width: 10px; height: 10px; }
    .image-area::-webkit-scrollbar-track { background: #0d0d0d; }
    .image-area::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 5px; }
    .image-area::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
    .image-area-inner {
      min-width: 100%; min-height: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }

    .loading-overlay {
      position: absolute; inset: 0; background: #0d0d0d;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 30;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #222;
      border-top-color: #4a9eff; border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: #666; }

    .compare-wrap {
      position: relative; display: none;
      cursor: ew-resize; box-shadow: 0 8px 48px rgba(0,0,0,0.7);
    }
    .compare-wrap.visible { display: inline-block; }
    /* Base layer = original (always fully visible underneath).
       Overlay = processed image, clipped to left half. Drag the divider
       to grow / shrink the processed-image side. User preference: result
       on LEFT, untouched original on RIGHT. */
    .img-base { display: block; }
    .left-clip {
      position: absolute; top: 0; left: 0;
      width: 50%; height: 100%; overflow: hidden;
    }
    .img-overlay {
      position: absolute; top: 0; left: 0; display: block;
    }
    .divider-line {
      position: absolute; top: 0; left: 50%;
      transform: translateX(-50%);
      width: 2px; height: 100%; background: rgba(255,255,255,0.9);
      z-index: 10; cursor: ew-resize; pointer-events: all;
    }
    .divider-handle {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 38px; height: 38px; border-radius: 50%;
      background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      color: #333; font-size: 11px; font-weight: 700; letter-spacing: -1px;
    }
    .img-badge {
      position: absolute; top: 14px;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
      color: #fff; font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 4px;
      pointer-events: none; z-index: 5;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .badge-left  { left: 14px; }
    .badge-right { right: 14px; }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px; background: #161616;
      border-left: 1px solid #222;
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-scroll { flex: 1; overflow-y: auto; padding: 20px 18px; }
    .sidebar-scroll::-webkit-scrollbar { width: 3px; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 2px; }

    .section { margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid #1e1e1e; }
    .section:last-child { border-bottom: none; }
    .section.disabled .section-body { opacity: 0.35; pointer-events: none; }
    .section-head {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; cursor: pointer; user-select: none;
    }
    .section-title {
      flex: 1; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: #888;
    }
    .section.disabled .section-title { color: #444; }
    .section.enabled  .section-title { color: #ddd; }

    /* iOS-style toggle switch */
    .toggle {
      position: relative; width: 32px; height: 18px;
      background: #2a2a2a; border-radius: 9px;
      transition: background 0.2s; flex-shrink: 0;
    }
    .toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: #777; transition: all 0.2s;
    }
    .section.enabled .toggle { background: #1d5bbf; }
    .section.enabled .toggle::after { left: 16px; background: #fff; }
    .ctrl-group { margin-bottom: 14px; }
    .ctrl-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .ctrl-name { font-size: 12px; color: #aaa; }
    .ctrl-value {
      font-size: 12px; color: #fff;
      font-variant-numeric: tabular-nums;
      min-width: 28px; text-align: right;
    }
    input[type=range] {
      -webkit-appearance: none;
      width: 100%; height: 3px;
      background: #2a2a2a; border-radius: 2px;
      outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: #4a9eff;
      box-shadow: 0 0 0 2px rgba(74,158,255,0.25);
      cursor: pointer;
    }
    input[type=range]:hover::-webkit-slider-thumb {
      box-shadow: 0 0 0 4px rgba(74,158,255,0.3);
    }
    .divider-h { border: none; border-top: 1px solid #1e1e1e; margin: 0 0 24px; }
    select {
      width: 100%; background: #1e1e1e; border: 1px solid #2a2a2a;
      color: #ccc; padding: 8px 10px;
      border-radius: 6px; font-size: 12px;
      cursor: pointer; outline: none; margin-top: 10px;
      transition: border-color 0.15s;
    }
    select:hover { border-color: #3a3a3a; }
    select:focus { border-color: #4a9eff; }

    .status-area {
      padding: 10px 18px; min-height: 36px;
      display: flex; align-items: center;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #333; margin-right: 8px; flex-shrink: 0;
      transition: background 0.2s;
    }
    .status-text { font-size: 11px; color: #555; }
    .status-area.working .status-dot { background: #4a9eff; animation: pulse 1s infinite; }
    .status-area.working .status-text { color: #4a9eff; }
    .status-area.done    .status-dot { background: #4caf7d; animation: none; }
    .status-area.done    .status-text { color: #4caf7d; }
    .status-area.error   .status-dot { background: #ff6b6b; animation: none; }
    .status-area.error   .status-text { color: #ff6b6b; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .sidebar-footer {
      padding: 14px 18px 18px;
      border-top: 1px solid #1e1e1e;
      display: flex; flex-direction: column; gap: 8px;
    }
    .format-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: #666;
    }
    .format-row select { margin-top: 0; padding: 6px 8px; }
    .btn-row { display: flex; gap: 8px; }
    .btn {
      flex: 1; padding: 10px 8px;
      border-radius: 7px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1px solid transparent;
      transition: all 0.15s; letter-spacing: 0.2px;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
    .btn-secondary {
      background: #1e1e1e; border-color: #2a2a2a; color: #888;
    }
    .btn-secondary:hover { background: #242424; color: #aaa; }
    .btn-primary {
      background: #1d5bbf; border-color: #2469d6; color: #fff;
    }
    .btn-primary:hover  { background: #2166cc; }
    .btn-primary:active { background: #1a56b3; }

    .version-note { font-size: 10px; color: #2a2a2a; text-align: center; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <span class="logo">CrispAI</span>
    <div class="sep"></div>
    <span class="filename" id="filename">No file open</span>
    <div class="topbar-right">
      <button class="text-btn hidden" id="btn-newfile" title="Open another image">Open…</button>
      <div class="hidden" id="zoom-group" style="display:flex;align-items:center;gap:4px;">
        <button class="icon-btn" id="btn-zoom-out" title="Zoom out">−</button>
        <span class="zoom-label" id="zoom-label">Fit</span>
        <button class="icon-btn" id="btn-zoom-in"  title="Zoom in">+</button>
        <button class="icon-btn" id="btn-zoom-fit" title="Fit to window">⊡</button>
      </div>
    </div>
  </div>

  <!-- ── Drop screen ──────────────────────────────────────────── -->
  <div class="drop-screen" id="drop-screen">
    <label class="drop-zone" id="drop-zone" for="file-input">
      <div class="drop-icon">↑</div>
      <div class="drop-title">Drop an image here</div>
      <div class="drop-hint">or click anywhere in this box to choose a file</div>
      <button class="drop-cta" type="button" id="btn-choose">Choose Image…</button>
      <div class="drop-formats">PNG · JPG · TIFF</div>
      <input type="file" id="file-input"
             accept=".png,.jpg,.jpeg,.tif,.tiff,image/png,image/jpeg,image/tiff"
             style="display:none;">
    </label>
  </div>

  <!-- ── Editor ───────────────────────────────────────────────── -->
  <div class="main hidden" id="main">

    <div class="image-area" id="image-area">
      <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">Loading…</div>
      </div>

      <div class="image-area-inner">
        <div class="compare-wrap" id="compare-wrap">
          <!-- Original image is the base (always fully visible underneath). -->
          <img id="img-original" class="img-base" draggable="false" />
          <!-- Processed overlays the left half (the "result" side). -->
          <div class="left-clip" id="left-clip">
            <img id="img-processed" class="img-overlay" draggable="false" />
          </div>
          <div class="divider-line" id="divider-line">
            <div class="divider-handle">◀▶</div>
          </div>
          <span class="img-badge badge-left">CrispAI</span>
          <span class="img-badge badge-right">Original</span>
        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-scroll">

        <!-- ─ Denoise ─ -->
        <div class="section enabled" data-section="denoise">
          <div class="section-head">
            <span class="section-title">Denoise</span>
            <div class="toggle"></div>
          </div>
          <div class="section-body">
            <select id="denoise-model">
              <option value="normal">Normal</option>
              <option value="strong">Strong</option>
              <option value="extreme">Extreme</option>
            </select>
            <div class="ctrl-group" style="margin-top:14px;">
              <div class="ctrl-header">
                <span class="ctrl-name">Strength</span>
                <span class="ctrl-value" id="denoise-val">50</span>
              </div>
              <input type="range" id="denoise-slider" min="0" max="100" value="50" />
            </div>
          </div>
        </div>

        <!-- ─ Sharpen (includes deblur sub-models, Topaz Photo AI style) ─ -->
        <div class="section enabled" data-section="sharpen">
          <div class="section-head">
            <span class="section-title">Sharpen</span>
            <div class="toggle"></div>
          </div>
          <div class="section-body">
            <select id="sharpen-model">
              <option value="standard">Standard</option>
              <option value="strong">Strong</option>
              <option value="lens_blur">Lens Blur</option>
              <option value="motion_blur">Motion Blur</option>
              <option value="refocus">Refocus</option>
            </select>
            <div class="ctrl-group" style="margin-top:14px;">
              <div class="ctrl-header">
                <span class="ctrl-name">Strength</span>
                <span class="ctrl-value" id="sharpen-val">50</span>
              </div>
              <input type="range" id="sharpen-slider" min="0" max="100" value="50" />
            </div>
            <!-- Shown only when Motion Blur model is selected -->
            <div class="ctrl-group" id="sharpen-angle-row" style="display:none;">
              <div class="ctrl-header">
                <span class="ctrl-name">Motion angle</span>
                <span class="ctrl-value" id="sharpen-angle-val">0°</span>
              </div>
              <input type="range" id="sharpen-angle" min="0" max="180" value="0" />
            </div>
          </div>
        </div>

      </div>

      <div class="status-area" id="status-area">
        <div class="status-dot"></div>
        <span class="status-text" id="status-text">Ready</span>
      </div>

      <div class="sidebar-footer">
        <button class="btn btn-secondary" id="btn-full-preview"
                style="margin-bottom:8px;" disabled
                title="Process the entire image at full resolution (slow, accurate)">
          Full-Quality Preview
        </button>
        <div class="format-row">
          <span>Save as</span>
          <select id="save-format">
            <option value="png">PNG</option>
            <option value="jpg">JPG (high quality)</option>
            <option value="tiff">TIFF (16-bit)</option>
          </select>
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" id="btn-discard">Discard</button>
          <button class="btn btn-primary"   id="btn-save" disabled>Save As…</button>
        </div>
        <div class="version-note">CrispAI v0.5</div>
      </div>
    </div>
  </div>

  <script>
    const API = location.origin;

    // ── Server lifecycle ──────────────────────────────────────────
    // Keep the backend alive while this window is open. Tell it to shut
    // down cleanly when the window closes — no more leftover pythonw.
    function pingServer() { fetch(`${API}/ping`, { method: 'POST' }).catch(() => {}); }
    pingServer();
    setInterval(pingServer, 30000);
    window.addEventListener('beforeunload', () => {
      // sendBeacon survives page tear-down where fetch usually doesn't
      navigator.sendBeacon(`${API}/shutdown`);
    });

    let sid = null;
    let imgW = 0, imgH = 0;
    let currentScale = 1;
    let debounceTimer = null;
    let previewInflight = false;

    const elDropScreen  = document.getElementById('drop-screen');
    const elDropZone    = document.getElementById('drop-zone');
    const elFileInput   = document.getElementById('file-input');
    const elBtnChoose   = document.getElementById('btn-choose');
    const elMain        = document.getElementById('main');

    const elArea        = document.getElementById('image-area');
    const elWrap        = document.getElementById('compare-wrap');
    const elOriginal    = document.getElementById('img-original');
    const elProcessed   = document.getElementById('img-processed');
    const elClip        = document.getElementById('left-clip');       // wraps the PROCESSED (left side)
    const elDivider     = document.getElementById('divider-line');
    const elLoading     = document.getElementById('loading-overlay');
    const elLoadingText = document.getElementById('loading-text');

    const elFilename    = document.getElementById('filename');
    const elZoomGroup   = document.getElementById('zoom-group');
    const elZoomLabel   = document.getElementById('zoom-label');
    const elBtnNewFile  = document.getElementById('btn-newfile');

    const elDenoiseSlider = document.getElementById('denoise-slider');
    const elDenoiseVal    = document.getElementById('denoise-val');
    const elDenoiseModel  = document.getElementById('denoise-model');

    const elSharpenSlider = document.getElementById('sharpen-slider');
    const elSharpenVal    = document.getElementById('sharpen-val');
    const elSharpenModel  = document.getElementById('sharpen-model');
    const elSharpenAngle  = document.getElementById('sharpen-angle');
    const elSharpenAngleVal = document.getElementById('sharpen-angle-val');
    const elSharpenAngleRow = document.getElementById('sharpen-angle-row');

    const elSaveFormat    = document.getElementById('save-format');

    const elStatusArea  = document.getElementById('status-area');
    const elStatusText  = document.getElementById('status-text');
    const elBtnSave     = document.getElementById('btn-save');
    const elBtnDiscard  = document.getElementById('btn-discard');
    const elBtnFullPreview = document.getElementById('btn-full-preview');

    // ── Helpers ─────────────────────────────────────────────────
    function setStatus(text, state = '') {
      elStatusText.textContent = text;
      elStatusArea.className = 'status-area' + (state ? ' ' + state : '');
    }

    function setLoading(show, text = '') {
      elLoading.style.display = show ? 'flex' : 'none';
      if (text) elLoadingText.textContent = text;
    }

    function showDropScreen() {
      elDropScreen.classList.remove('hidden');
      elMain.classList.add('hidden');
      elZoomGroup.classList.add('hidden');
      elBtnNewFile.classList.add('hidden');
      elFilename.textContent = 'No file open';
      elWrap.classList.remove('visible');
      sid = null;
    }

    function showEditor() {
      elDropScreen.classList.add('hidden');
      elMain.classList.remove('hidden');
      elZoomGroup.classList.remove('hidden');
      elZoomGroup.style.display = 'flex';
      elBtnNewFile.classList.remove('hidden');
    }

    // ── File selection ──────────────────────────────────────────
    elBtnChoose.addEventListener('click', e => { e.preventDefault(); elFileInput.click(); });
    elDropZone.addEventListener('click', e => {
      if (e.target === elBtnChoose) return;
      elFileInput.click();
    });
    elFileInput.addEventListener('change', e => {
      const f = e.target.files && e.target.files[0];
      if (f) handleFile(f);
    });
    elBtnNewFile.addEventListener('click', () => { elFileInput.value = ''; elFileInput.click(); });

    // Drag and drop
    ['dragenter','dragover'].forEach(ev =>
      elDropZone.addEventListener(ev, e => {
        e.preventDefault(); e.stopPropagation();
        elDropZone.classList.add('dragging');
      })
    );
    ['dragleave','drop'].forEach(ev =>
      elDropZone.addEventListener(ev, e => {
        e.preventDefault(); e.stopPropagation();
        elDropZone.classList.remove('dragging');
      })
    );
    elDropZone.addEventListener('drop', e => {
      const f = e.dataTransfer.files && e.dataTransfer.files[0];
      if (f) handleFile(f);
    });
    // Allow drop on editor too (replace current image)
    window.addEventListener('dragover',  e => e.preventDefault());
    window.addEventListener('drop',      e => {
      e.preventDefault();
      const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (f) handleFile(f);
    });

    async function handleFile(file) {
      showEditor();
      setLoading(true, 'Uploading…');
      elFilename.textContent = file.name;

      try {
        const fd = new FormData();
        fd.append('file', file);
        const r = await fetch(`${API}/session/upload`, { method: 'POST', body: fd });
        if (!r.ok) {
          const e = await r.json().catch(() => ({}));
          throw new Error(e.error || `HTTP ${r.status}`);
        }
        const data = await r.json();
        sid = data.session_id;
        imgW = data.width; imgH = data.height;

        // Fetch original for display
        setLoading(true, 'Decoding…');
        const orig = await fetch(`${API}/session/${sid}/original`).then(r => r.json());

        elOriginal.src = `data:image/jpeg;base64,${orig.image}`;
        elOriginal.onload = () => {
          // Use the displayed image's actual size for zoom math, not the
          // original full-res dimensions (preview is downscaled for speed).
          imgW = elOriginal.naturalWidth;
          imgH = elOriginal.naturalHeight;
          setLoading(false);
          elWrap.classList.add('visible');
          fitToWindow();
          elProcessed.src = elOriginal.src;
          requestPreview();
        };
      } catch (e) {
        setLoading(true, 'Failed: ' + e.message);
        setTimeout(() => { showDropScreen(); }, 2500);
      }
    }

    // ── Sizing ──────────────────────────────────────────────────
    function applyScale(scale) {
      currentScale = scale;
      const dw = Math.round(imgW * scale);
      const dh = Math.round(imgH * scale);
      elOriginal.style.width  = dw + 'px';
      elOriginal.style.height = dh + 'px';
      elProcessed.style.width  = dw + 'px';
      elProcessed.style.height = dh + 'px';
      elZoomLabel.textContent = Math.round(scale * 100) + '%';
    }
    function fitToWindow() {
      const aw = elArea.clientWidth  - 40;
      const ah = elArea.clientHeight - 40;
      const scale = Math.min(1, aw / imgW, ah / imgH);
      applyScale(scale);
    }
    // Zoom that anchors a screen-point so the same image pixel stays under
    // that point. anchorClientX/Y default to the centre of the viewport.
    function zoomTo(newScale, anchorClientX, anchorClientY) {
      if (!imgW) return;
      newScale = Math.max(0.05, Math.min(newScale, 4));
      if (Math.abs(newScale - currentScale) < 0.001) return;

      const areaRect = elArea.getBoundingClientRect();
      if (anchorClientX == null) anchorClientX = areaRect.left + areaRect.width / 2;
      if (anchorClientY == null) anchorClientY = areaRect.top  + areaRect.height / 2;

      const r = elWrap.getBoundingClientRect();
      const ax = anchorClientX - r.left;   // anchor position inside the wrap, pre-zoom
      const ay = anchorClientY - r.top;
      const ratio = newScale / currentScale;

      applyScale(newScale);
      requestAnimationFrame(() => {
        elArea.scrollLeft += ax * (ratio - 1);
        elArea.scrollTop  += ay * (ratio - 1);
      });
    }

    document.getElementById('btn-zoom-in') .addEventListener('click', () => zoomTo(currentScale * 1.25));
    document.getElementById('btn-zoom-out').addEventListener('click', () => zoomTo(currentScale / 1.25));
    document.getElementById('btn-zoom-fit').addEventListener('click', fitToWindow);
    window.addEventListener('resize', () => { if (imgW) fitToWindow(); });

    // ── Section enable/disable toggles ──────────────────────────
    document.querySelectorAll('.section').forEach(sec => {
      const head = sec.querySelector('.section-head');
      head.addEventListener('click', () => {
        sec.classList.toggle('enabled');
        requestPreview();
      });
    });

    function sectionEnabled(name) {
      const sec = document.querySelector(`.section[data-section="${name}"]`);
      return sec && sec.classList.contains('enabled');
    }

    // ── Preview ─────────────────────────────────────────────────
    function getParams() {
      return {
        denoise: {
          enabled:  sectionEnabled('denoise'),
          model:    elDenoiseModel.value,
          strength: elDenoiseSlider.value / 100,
        },
        sharpen: {
          enabled:  sectionEnabled('sharpen'),
          model:    elSharpenModel.value,
          strength: elSharpenSlider.value / 100,
          angle:    +elSharpenAngle.value,
        },
      };
    }

    function requestPreview() {
      if (!sid) return;
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(doPreview, 350);
    }

    async function doPreview() {
      if (!sid) return;
      if (previewInflight) { debounceTimer = setTimeout(doPreview, 200); return; }
      previewInflight = true;
      setStatus('Updating preview…', 'working');
      try {
        const r = await fetch(`${API}/session/${sid}/preview`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(getParams()),
        });
        if (!r.ok) { const e = await r.json(); throw new Error(e.error || r.status); }
        const data = await r.json();
        elProcessed.src = `data:image/jpeg;base64,${data.image}`;
        elBtnSave.disabled = false;
        elBtnFullPreview.disabled = false;
        setStatus('Drag the divider to compare', 'done');
      } catch (e) {
        setStatus('Preview error: ' + e.message, 'error');
      } finally {
        previewInflight = false;
      }
    }

    elDenoiseSlider.addEventListener('input', () => {
      elDenoiseVal.textContent = elDenoiseSlider.value;
      requestPreview();
    });
    elDenoiseModel.addEventListener('change', requestPreview);

    elSharpenSlider.addEventListener('input', () => {
      elSharpenVal.textContent = elSharpenSlider.value;
      requestPreview();
    });
    elSharpenModel.addEventListener('change', () => {
      // Angle slider is only meaningful for the Motion Blur model
      elSharpenAngleRow.style.display = (elSharpenModel.value === 'motion_blur') ? '' : 'none';
      requestPreview();
    });
    elSharpenAngle.addEventListener('input', () => {
      elSharpenAngleVal.textContent = elSharpenAngle.value + '°';
      requestPreview();
    });

    // ── Divider drag + double-click zoom ─────────────────────────
    // We use pointer events for drag, then detect double-click ourselves
    // via pointerup timing. Calling e.preventDefault() on pointerdown
    // suppresses the synthesized dblclick event, so a native dblclick
    // listener would never fire — manual detection is the fix.

    let dragging = false;
    let lastTapTime = 0;
    let lastTapX = 0, lastTapY = 0;
    let pointerDownAt = 0;
    let pointerDownX = 0, pointerDownY = 0;

    function moveDivider(clientX) {
      const rect = elWrap.getBoundingClientRect();
      if (rect.width === 0) return;
      const pct = Math.max(0, Math.min((clientX - rect.left) / rect.width, 1)) * 100;
      elClip.style.width   = pct + '%';
      elDivider.style.left = pct + '%';
    }

    function toggleZoom(clientX, clientY) {
      if (Math.abs(currentScale - 1.0) < 0.005) {
        fitToWindow();
      } else {
        zoomTo(1.0, clientX, clientY);   // double-click point stays under cursor
      }
    }

    elWrap.addEventListener('pointerdown', e => {
      dragging = true;
      try { elWrap.setPointerCapture(e.pointerId); } catch (_) {}
      pointerDownAt = Date.now();
      pointerDownX = e.clientX;
      pointerDownY = e.clientY;
      moveDivider(e.clientX);
      e.preventDefault();
    });

    elWrap.addEventListener('pointermove', e => { if (dragging) moveDivider(e.clientX); });

    elWrap.addEventListener('pointerup', e => {
      dragging = false;
      const now = Date.now();
      const movedFar  = Math.abs(e.clientX - pointerDownX) > 6 || Math.abs(e.clientY - pointerDownY) > 6;
      const heldLong  = now - pointerDownAt > 300;
      if (movedFar || heldLong) { lastTapTime = 0; return; }    // was a drag, not a tap

      const dx = Math.abs(e.clientX - lastTapX);
      const dy = Math.abs(e.clientY - lastTapY);
      if (now - lastTapTime < 400 && dx < 12 && dy < 12) {
        toggleZoom(e.clientX, e.clientY);                       // double-tap: zoom
        lastTapTime = 0;
      } else {
        lastTapTime = now;
        lastTapX = e.clientX;
        lastTapY = e.clientY;
      }
    });

    elWrap.addEventListener('pointercancel', () => { dragging = false; });

    // Mouse-wheel zoom — anchors the pixel under the cursor (Photoshop convention)
    elArea.addEventListener('wheel', e => {
      if (!imgW) return;
      e.preventDefault();
      const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
      zoomTo(currentScale * factor, e.clientX, e.clientY);
    }, { passive: false });

    // ── Save As ─────────────────────────────────────────────────
    // ── Full-Quality Preview ───────────────────────────────────
    // Re-runs the pipeline at the original full resolution and replaces
    // the processed-image src with the result. Slow on 50 MP photos
    // (3-15 s depending on enabled stages) but lets the user see exactly
    // what Save As will produce.
    elBtnFullPreview.addEventListener('click', async () => {
      if (!sid) return;
      elBtnFullPreview.disabled = true;
      elBtnSave.disabled = true;
      setStatus('Processing at full resolution…', 'working');
      try {
        const r = await fetch(`${API}/session/${sid}/preview_full`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(getParams()),
        });
        if (!r.ok) { const e = await r.json(); throw new Error(e.error || r.status); }
        const data = await r.json();
        elProcessed.src = `data:image/jpeg;base64,${data.image}`;
        setStatus('Full-quality preview ready  ✓', 'done');
      } catch (e) {
        setStatus('Full preview error: ' + e.message, 'error');
      } finally {
        elBtnFullPreview.disabled = false;
        elBtnSave.disabled = false;
      }
    });

    elBtnSave.addEventListener('click', async () => {
      if (!sid) return;
      elBtnSave.disabled = true;
      elBtnDiscard.disabled = true;
      setStatus('Processing full resolution…', 'working');
      try {
        const r = await fetch(`${API}/session/${sid}/apply`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(getParams()),
        });
        if (!r.ok) { const e = await r.json(); throw new Error(e.error || r.status); }

        setStatus('Downloading…', 'working');
        const fmt = elSaveFormat.value;
        // Trigger browser download
        const a = document.createElement('a');
        a.href = `${API}/session/${sid}/download?format=${fmt}`;
        a.download = '';
        document.body.appendChild(a);
        a.click();
        a.remove();
        setStatus('Saved!  ', 'done');
      } catch (e) {
        setStatus('Save error: ' + e.message, 'error');
      } finally {
        elBtnSave.disabled = false;
        elBtnDiscard.disabled = false;
      }
    });

    // ── Discard ─────────────────────────────────────────────────
    elBtnDiscard.addEventListener('click', () => {
      if (sid) fetch(`${API}/session/${sid}/cancel`, { method: 'POST' }).catch(() => {});
      showDropScreen();
    });

    // ── Optional session=xxx in URL (from PS plugin path) ───────
    const urlSid = new URLSearchParams(location.search).get('session');
    if (urlSid) {
      sid = urlSid;
      showEditor();
      setLoading(true, 'Loading…');
      fetch(`${API}/session/${sid}/original`).then(r => r.json()).then(data => {
        imgW = data.width; imgH = data.height;
        elFilename.textContent = `${imgW} × ${imgH} px (from Photoshop)`;
        elOriginal.src = `data:image/jpeg;base64,${data.image}`;
        elOriginal.onload = () => {
          setLoading(false);
          elWrap.classList.add('visible');
          fitToWindow();
          elProcessed.src = elOriginal.src;
          requestPreview();
        };
      }).catch(e => { setLoading(true, 'Failed: ' + e.message); });
    }
  </script>
</body>
</html>
